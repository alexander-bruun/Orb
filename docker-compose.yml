services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orb
      POSTGRES_PASSWORD: orb
      POSTGRES_DB: orb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orb"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  valkey:
    image: valkey/valkey:7-alpine
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    restart: unless-stopped

  app:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    image: alexbruun/orb:latest
    environment:
      DATABASE_URL: postgres://orb:orb@postgres:5432/orb?sslmode=disable
      KV_MODE: standalone
      KV_ADDR: valkey:6379
      STORE_ROOT: /data/audio
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      HTTP_PORT: "8080"
      INGEST_DIRS: /music
      INGEST_WATCH: "true"
      DLNA_ENABLED: "true"
    volumes:
      - audio_data:/data/audio
      - /my-music:/music:ro
    ports:
      - 3000:80 # UI
      - 8080:8080 # API
      - 9090:9090 # DLNA
      - 1900:1900/udp # SSDP for DLNA discovery
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  audio_data:
