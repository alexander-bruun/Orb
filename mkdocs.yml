site_name: Orb
site_url: https://alexander-bruun.github.io/orb/
site_author: Alexander Bruun
site_description: >-
  Orb is a self-hosted, lossless music streaming platform - a personal Spotify backed by your own audio library. Stream FLAC, WAV, and other lossless formats at full fidelity to a modern web client. Multi-user, playlists, and queue support.

repo_name: alexander-bruun/orb
repo_url: https://github.com/alexander-bruun/orb

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Tauri: tauri.md

theme:
  name: material
  language: en

  features:
    - content.action.edit
    - content.action.view
    - content.tooltips
    - navigation.sections
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

  logo: https://raw.githubusercontent.com/alexander-bruun/orb/main/assets/img/icon.png
  favicon: https://raw.githubusercontent.com/alexander-bruun/orb/main/assets/img/icon.png

  palette:

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - offline

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences