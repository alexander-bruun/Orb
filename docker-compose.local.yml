# Local single-server deployment — no pgBouncer, no Sentinel.
# On a fresh volume Postgres runs schema.sql via initdb; on an existing volume
# the API applies any schema changes automatically on startup via store.Migrate().
# Music is served directly from the local filesystem via a shared volume.
#
# Multiple music directories are supported — mount each source drive as a
# separate read-only volume under /music/<name> and list them comma-separated
# in the INGEST_DIRS environment variable:
#
#   volumes:
#     - /mnt/d/Music:/music/drive-d:ro
#     - /mnt/e/FLAC:/music/drive-e:ro
#   environment:
#     INGEST_DIRS: /music/drive-d,/music/drive-e
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orb
      POSTGRES_PASSWORD: orb
      POSTGRES_DB: orb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the whole db/ directory so Docker Desktop doesn't cache a
      # stale single-file bind-mount path. Postgres only executes .sql files
      # directly in initdb.d (not subdirectories), so schema.sql runs once on
      # a fresh volume; migrations/, queries/
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orb"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  valkey:
    image: valkey/valkey:7-alpine
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgres://orb:orb@postgres:5432/orb?sslmode=disable
      KV_MODE: standalone
      KV_ADDR: valkey:6379
      STORE_ROOT: /data/audio
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      HTTP_PORT: "8080"
    volumes:
      - audio_data:/data/audio
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  ingest:
    build:
      context: .
      dockerfile: docker/ingest.Dockerfile
    environment:
      DATABASE_URL: postgres://orb:orb@postgres:5432/orb?sslmode=disable
      STORE_ROOT: /data/audio
      INGEST_DIRS: /music/drive-d
    command: ["--recursive", "--watch", "--compute-similarity"]
    volumes:
      - audio_data:/data/audio
      - /mnt/d/Music:/music/drive-d:ro
      # Add more drives as needed:
      # - /mnt/e/FLAC:/music/drive-e:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  audio_data:
