[package]
name = "orb"
version = "0.0.1"
edition = "2021"

[lib]
name = "orb_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
mdns-sd = "0.18"
discord-rich-presence = "1.1"
tauri-plugin-mediasession = { path = "../../tauri-plugin-mediasession" }
tauri-plugin-car = { path = "../../tauri-plugin-car" }

## tauri-plugin-media removed: Android-only focus, plugin omitted

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
