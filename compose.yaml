services:
  secrets-init:
    image: alpine:3.21
    volumes:
      - secrets:/run/secrets
    # Generate credentials on first boot only; no-op on subsequent runs.
    command: >-
      sh -c "
      [ -f /run/secrets/db_password ] || od -A n -t x -N 16 /dev/urandom | tr -d ' \n\t' > /run/secrets/db_password &&
      [ -f /run/secrets/jwt_secret  ] || od -A n -t x -N 32 /dev/urandom | tr -d ' \n\t' > /run/secrets/jwt_secret  &&
      chmod 600 /run/secrets/db_password /run/secrets/jwt_secret
      "
    restart: "no"
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orb
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: orb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orb"]
      interval: 5s
      retries: 10
    depends_on:
      secrets-init:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, SETGID, SETUID, DAC_OVERRIDE]

  valkey:
    image: valkey/valkey:7-alpine
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, SETGID, SETUID, DAC_OVERRIDE]

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      KV_MODE: standalone
      KV_ADDR: "valkey:6379"
      DB_HOST: "postgres"
      STORE_ROOT: /data/audio
      HTTP_PORT: "8080"
      MUSIC_DIRS: /music
      AUDIOBOOK_DIRS: /audiobooks
      PODCAST_DEFAULT_RSS_URLS: "https://feeds.megaphone.fm/thispastweekend,https://feeds.simplecast.com/54nAGcIl,https://feeds.simplecast.com/qm_9xx0g,https://podcast.darknetdiaries.com/,https://feeds.megaphone.fm/ear-biscuits,https://feeds.megaphone.fm/GLT1412515089"
    volumes:
      - audio_data:/data/audio
      - secrets:/run/secrets:ro
      - ${MUSIC_DIR:-/mnt/d/Music}:/music:ro
      - ${AUDIOBOOK_DIR:-/mnt/d/Audiobooks}:/audiobooks:ro
    ports:
      - "3000:3000"
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, CHOWN, SETGID, SETUID, DAC_OVERRIDE]

volumes:
  postgres_data:
  valkey_data:
  audio_data:
  secrets:
