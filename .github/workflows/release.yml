name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  REGISTRY_IMAGE: alexbruun/orb

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ${{ steps.cliff.outputs.content }}

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libavahi-compat-libdnssd-dev

      - name: Build Tauri desktop
        run: make tauri-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Standardize Tauri artifact names
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          if [ "${{ matrix.platform }}" = 'ubuntu-22.04' ]; then
            for f in web/src-tauri/target/release/bundle/deb/*.deb; do
              [ -f "$f" ] || continue
              cp "$f" "release-artifacts/orb-${TAG}-linux.deb"
            done
            for f in web/src-tauri/target/release/bundle/appimage/*.AppImage; do
              [ -f "$f" ] || continue
              cp "$f" "release-artifacts/orb-${TAG}-linux.AppImage"
            done
          fi
          if [ "${{ matrix.platform }}" = 'macos-latest' ]; then
            for f in web/src-tauri/target/release/bundle/dmg/*.dmg; do
              [ -f "$f" ] || continue
              cp "$f" "release-artifacts/orb-${TAG}-macos.dmg"
            done
          fi
          if [ "${{ matrix.platform }}" = 'windows-latest' ]; then
            for f in web/src-tauri/target/release/bundle/nsis/*.exe; do
              [ -f "$f" ] || continue
              cp "$f" "release-artifacts/orb-${TAG}-windows.exe"
            done
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*

  build-tauri-android:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android SDK
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
          ANDROID_HOME: ${{ runner.temp }}/android-sdk
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          SDK_ROOT="$ANDROID_SDK_ROOT"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          mkdir -p "$SDK_ROOT/cmdline-tools"
          curl -sSfL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d "$SDK_ROOT/cmdline-tools"
          if [ -d "$SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
            mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          fi
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"
          echo "NDK_HOME=$SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: make web-install

      - name: Initialize Tauri Android
        run: make tauri-android-init-ci

      - name: Build Tauri Android
        run: make tauri-android-build-ci

      - name: Standardize Android artifact names
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          for f in web/src-tauri/gen/android/app/build/outputs/**/*.apk; do
            [ -f "$f" ] || continue
            cp "$f" "release-artifacts/orb-${TAG}-android.apk"
            break
          done
          for f in web/src-tauri/gen/android/app/build/outputs/**/*.aab; do
            [ -f "$f" ] || continue
            cp "$f" "release-artifacts/orb-${TAG}-android.aab"
            break
          done

      - name: Upload Android artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*

  build-tauri-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install frontend dependencies
        run: make web-install

      - name: Initialize Tauri iOS
        run: make tauri-ios-init-ci

      - name: Build Tauri iOS
        run: make tauri-ios-build-ci

      - name: Standardize iOS artifact names
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          find web/src-tauri/gen/ios -name "*.ipa" -exec cp {} "release-artifacts/orb-${TAG}-ios.ipa" \; 2>/dev/null || true

      - name: Upload iOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*

  publish-image:
    name: Build and Publish Docker Image (multi-arch)
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      IMAGE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  publish-release:
    needs: [create-release, build-tauri, build-tauri-android, build-tauri-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
