name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  REGISTRY_IMAGE: alexbruun/orb

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ${{ steps.cliff.outputs.content }}

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libavahi-compat-libdnssd-dev

      - name: Make Tauri build
        run: make tauri-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Standardize Tauri artifact names
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          if [ "${{ matrix.platform }}" = 'ubuntu-22.04' ]; then
            for f in web/src-tauri/target/release/bundle/deb/*.deb; do
              [ -f "$f" ] || continue
              cp "$f" "release-artifacts/orb-${TAG}-linux.deb"
            done
            for f in web/src-tauri/target/release/bundle/appimage/*.AppImage; do
              [ -f "$f" ] || continue
              cp "$f" "release-artifacts/orb-${TAG}-linux.AppImage"
            done
          fi
          if [ "${{ matrix.platform }}" = 'macos-latest' ]; then
            for f in web/src-tauri/target/release/bundle/dmg/*.dmg; do
              [ -f "$f" ] || continue
              cp "$f" "release-artifacts/orb-${TAG}-macos.dmg"
            done
          fi
          if [ "${{ matrix.platform }}" = 'windows-latest' ]; then
            mkdir -p release-artifacts
            for f in web/src-tauri/target/release/bundle/nsis/*.exe; do
              [ -f "$f" ] || continue
              cp "$f" "release-artifacts/orb-${TAG}-windows.exe"
            done
          fi

      - name: Upload release assets (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*

      - name: Upload release assets (macOS)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*

      - name: Upload release assets (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*

  cap-android:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install frontend dependencies (npm)
        run: cd web && npm install

      - name: Build frontend assets
        run: |
          cd web
          npm run build

      - name: Setup Node 22 for Capacitor
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Run Capacitor sync (with Node)
        run: |
          cd web
          npx cap sync

      - name: Make Capacitor Android build (with Node)
        run: |
          cd web
          npx cap build android

      - name: Standardize Android artifact names
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          # APKs
          for f in web/android/app/build/outputs/**/*.apk; do
            [ -f "$f" ] || continue
            cp "$f" "release-artifacts/orb-${TAG}-android.apk"
            break
          done
          # AABs
          for f in web/android/app/build/outputs/**/*.aab; do
            [ -f "$f" ] || continue
            cp "$f" "release-artifacts/orb-${TAG}-android.aab"
            break
          done

      - name: Upload Android artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*

  cap-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install frontend dependencies (npm)
        run: cd web && npm install

      - name: Build frontend assets
        run: |
          cd web
          npm run build

      - name: Setup Node 22 for Capacitor
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Run Capacitor sync (with Node)
        run: |
          cd web
          npx cap sync

      - name: Make Capacitor iOS build (with Node)
        run: |
          cd web
          npx cap build ios

      - name: Standardize iOS artifact names
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          # Copy .ipa if present
          for f in web/ios/build/*.ipa; do
            [ -f "$f" ] || continue
            cp "$f" "release-artifacts/orb-${TAG}-ios.ipa"
            break
          done
          # Archive xcarchive if present (zip it)
          if [ -d "web/ios/App.xcarchive" ]; then
            cd web/ios
            zip -r ../../release-artifacts/orb-${TAG}-ios.xcarchive.zip App.xcarchive
            cd -
          fi

      - name: Upload iOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/*


  publish-image:
    name: Build and Publish Docker Image (multi-arch)
    needs: create-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      IMAGE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  publish-release:
    needs: [create-release, build-tauri, cap-android, cap-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
