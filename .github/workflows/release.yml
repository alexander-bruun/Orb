name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ${{ steps.cliff.outputs.content }}

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web/ui/src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: web/ui

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd web/ui/src-tauri
          if command -v jq &> /dev/null; then
            jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          else
            python3 -c "
          import json, sys
          with open('tauri.conf.json', 'r') as f: cfg = json.load(f)
          cfg['version'] = sys.argv[1]
          with open('tauri.conf.json', 'w') as f: json.dump(cfg, f, indent=2)
          " "$VERSION"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web/ui
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  build-android:
    name: Android APK
    needs: create-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web/ui/src-tauri -> target
          cache-targets: "aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android"

      - name: Install Android NDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2'

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd src-tauri
          if command -v jq &> /dev/null; then
            jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          else
            python3 -c "
          import json, sys
          with open('tauri.conf.json', 'r') as f: cfg = json.load(f)
          cfg['version'] = sys.argv[1]
          with open('tauri.conf.json', 'w') as f: json.dump(cfg, f, indent=2)
          " "$VERSION"
          fi

      - name: Tauri Android init
        run: cargo tauri android init || true

      - name: Build Android (release)
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: cargo tauri android build --apk --split-per-abi

      - name: Sign and rename APKs
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          declare -A ARCH_MAP=(
            ["app-arm-release-unsigned"]="armv7"
            ["app-arm64-release-unsigned"]="aarch64"
            ["app-x86-release-unsigned"]="x86"
            ["app-x86_64-release-unsigned"]="x86_64"
          )

          # Generate a throwaway signing key (self-signed, good for sideloading)
          keytool -genkeypair -v \
            -keystore /tmp/orb-release.jks \
            -alias orb \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass orbrelease \
            -keypass orbrelease \
            -dname "CN=Orb, O=Orb, C=US"

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -name zipalign   | sort -V | tail -1)

          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | while read f; do
            base=$(basename "$f" .apk)
            arch="${ARCH_MAP[$base]}"
            if [[ -n "$arch" ]]; then
              aligned="/tmp/Orb_${VERSION}_${arch}-aligned.apk"
              signed="$(dirname "$f")/Orb_${VERSION}_${arch}.apk"
              "$ZIPALIGN" -f 4 "$f" "$aligned"
              "$APKSIGNER" sign \
                --ks /tmp/orb-release.jks \
                --ks-key-alias orb \
                --ks-pass pass:orbrelease \
                --key-pass pass:orbrelease \
                --out "$signed" \
                "$aligned"
            fi
          done

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          release_id: ${{ needs.create-release.outputs.release_id }}
          files: web/ui/src-tauri/gen/android/app/build/outputs/apk/**/Orb_*.apk

  publish-release:
    needs: [create-release, build-tauri, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
