version: 2

updates:
  # Go modules: services/ contains the primary go.mod
  - package-ecosystem: "gomod"
    directory: "/services"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "ci"

  # UI dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ui"

  # Tauri / Rust dependencies for the desktop wrapper
  - package-ecosystem: "cargo"
    directory: "/web/src-tauri"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "rust"

  # Docker images referenced by local Dockerfiles
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # Android Gradle projects (wrapper, plugins, dependencies)
  - package-ecosystem: "gradle"
    directory: "/web/android"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "android"

  - package-ecosystem: "gradle"
    directory: "/web/android/capacitor-cordova-android-plugins"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "android"
